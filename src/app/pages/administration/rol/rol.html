<p-toolbar styleClass="mb-6">
    <ng-template #start>
        <p-button label="Nuevo" icon="pi pi-plus" severity="secondary" class="mr-2" (onClick)="openNew()" />
        <p-button label="Exportar" icon="pi pi-upload" severity="secondary" (onClick)="exportCSV()" />
    </ng-template>
</p-toolbar>

<p-table #dt [value]="roles()" [rows]="10" [columns]="cols" [paginator]="true"
    [globalFilterFields]="['rol']"
    [tableStyle]="{ 'min-width': '50rem' }" [(selection)]="selectedRoles" [rowHover]="true" dataKey="id"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} roles" [showCurrentPageReport]="true"
    [rowsPerPageOptions]="[10, 20, 30]">
    <ng-template #caption>
        <div class="flex items-center justify-between">
            <h5 class="m-0">Roles</h5>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Buscar..." />
            </p-iconfield>
        </div>
    </ng-template>
    <ng-template #header>
        <tr>
            <th style="width: 3rem">
                <p-tableHeaderCheckbox />
            </th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </ng-template>
    <ng-template #body let-role>
        <tr>
            <td style="width: 3rem">
                <p-tableCheckbox [value]="role" />
            </td>
            <td>{{ role.rol }}</td>
            <td>
                <p-tag [value]="role.estado ? 'Activo' : 'Inactivo'" [severity]="role.estado ? 'success' : 'danger'"></p-tag>
            </td>
            <td>
                <p-button icon="pi pi-info-circle" class="mr-2" [rounded]="true" [outlined]="true" (click)="viewRole(role)" />
                <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" (click)="editRole(role)" />
                <p-button icon="pi pi-trash" severity="danger" class="mr-2" [rounded]="true" [outlined]="true" (click)="deleteRole(role)" />
                <p-button icon="pi pi-refresh" severity="info" [rounded]="true" [outlined]="true" (click)="activateRole(role)" *ngIf="!role.estado" />
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [(visible)]="roleDialog" [style]="{ width: '320px' }" [modal]="true" [closable]="true" [dismissableMask]="true" [header]="viewMode ? 'Informacion de Rol' : (editMode ? 'Editar Rol' : 'Nuevo Rol')">
    <ng-template #content>
        <form (ngSubmit)="saveRole()" #roleFormRef="ngForm">
            <div class="flex flex-col gap-4">
                <div>
                    <label for="rol" class="block font-bold mb-2">Rol</label>
                    <input type="text" pInputText id="rol" [(ngModel)]="roleForm.rol" name="rol" required [readonly]="viewMode" />
                </div>
                <div *ngIf="editMode || viewMode" class="flex items-center gap-2">
                    <input type="checkbox" id="estado" [(ngModel)]="roleForm.estado" name="estado" [disabled]="viewMode" />
                    <label for="estado" class="font-bold">Activo</label>
                </div>
            </div>
        </form>
    </ng-template>
    <ng-template #footer>
        <p-button label="Cerrar" icon="pi pi-times" text (click)="roleDialog = false" />
        <p-button *ngIf="!viewMode" label="Guardar" icon="pi pi-check" (click)="saveRole()" [disabled]="!roleForm.rol" />
    </ng-template>
</p-dialog>

<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
