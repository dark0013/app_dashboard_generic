
<p-toolbar styleClass="mb-6">
    <ng-template #start>
        <p-button label="Nuevo" icon="pi pi-plus" severity="secondary" class="mr-2" (onClick)="openNew()" />
        <p-button label="Exportar" icon="pi pi-upload" severity="secondary" (onClick)="exportCSV()" />
    </ng-template>
</p-toolbar>

<p-table #dt [value]="users()" [rows]="10" [columns]="cols" [paginator]="true"
    [globalFilterFields]="['nombres', 'apellidos', 'cedula', 'email', 'username']"
    [tableStyle]="{ 'min-width': '75rem' }" [(selection)]="selectedUsers" [rowHover]="true" dataKey="id"
    currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} usuarios" [showCurrentPageReport]="true"
    [rowsPerPageOptions]="[10, 20, 30]">
    <ng-template #caption>
        <div class="flex items-center justify-between">
            <h5 class="m-0">Usuarios</h5>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Buscar..." />
            </p-iconfield>
        </div>
    </ng-template>
    <ng-template #header>
        <tr>
            <th style="width: 3rem">
                <p-tableHeaderCheckbox />
            </th>
            <th>Cédula</th>
            <th>Nombres</th>           
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </ng-template>
    <ng-template #body let-user>
        <tr>
            <td style="width: 3rem">
                <p-tableCheckbox [value]="user" />
            </td>
            <td>{{ user.cedula }}</td>
            <td>{{ user.nombres + ' ' + user.apellidos }}</td>
            <td>
                <p-tag [value]="user.estado ? 'Activo' : 'Inactivo'" [severity]="user.estado ? 'success' : 'danger'"></p-tag>
            </td>
            <td>
                <p-button icon="pi pi-info-circle" class="mr-2" [rounded]="true" [outlined]="true" (click)="viewUser(user)" />
                <p-button icon="pi pi-pencil" class="mr-2" [rounded]="true" [outlined]="true" (click)="editUser(user)" />
                <p-button icon="pi pi-trash" severity="danger" [rounded]="true" [outlined]="true" (click)="deleteUser(user)" />
                <p-button icon="pi pi-refresh" severity="info" [rounded]="true" [outlined]="true" (click)="restoreUser(user)" *ngIf="!user.estado" />
            </td>
        </tr>
    </ng-template>
</p-table>

<p-dialog [(visible)]="userDialog" [style]="{ width: '220px' }" [modal]="true" [closable]="true" [dismissableMask]="true" [header]="viewMode ? 'Información de Usuario' : (editMode ? 'Editar Usuario' : 'Nuevo Usuario')">
    <ng-template #content>
        <form (ngSubmit)="saveUser()" #userFormRef="ngForm">
            <div class="flex flex-col gap-4">
                <div>
                    <label for="cedula" class="block font-bold mb-2">Cédula</label>
                    <input type="text" pInputText id="cedula" [(ngModel)]="userForm.cedula" name="cedula" required [readonly]="viewMode" />
                </div>
                <div>
                    <label for="nombres" class="block font-bold mb-2">Nombres</label>
                    <input type="text" pInputText id="nombres" [(ngModel)]="userForm.nombres" name="nombres" required [readonly]="viewMode" />
                </div>
                <div>
                    <label for="apellidos" class="block font-bold mb-2">Apellidos</label>
                    <input type="text" pInputText id="apellidos" [(ngModel)]="userForm.apellidos" name="apellidos" required [readonly]="viewMode" />
                </div>
                <div>
                    <label for="direccion" class="block font-bold mb-2">Dirección</label>
                    <input type="text" pInputText id="direccion" [(ngModel)]="userForm.direccion" name="direccion" required [readonly]="viewMode" />
                </div>
                <div>
                    <label for="telefono" class="block font-bold mb-2">Teléfono</label>
                    <input type="text" pInputText id="telefono" [(ngModel)]="userForm.telefono" name="telefono" required [readonly]="viewMode" />
                </div>
                <div>
                    <label for="email" class="block font-bold mb-2">Email</label>
                    <input type="email" pInputText id="email" [(ngModel)]="userForm.email" name="email" required [readonly]="viewMode" />
                </div>
                <div>
                    <label for="username" class="block font-bold mb-2">Username</label>
                    <input type="text" pInputText id="username" [(ngModel)]="userForm.username" name="username" required [readonly]="viewMode" />
                </div>
            </div>
        </form>
    </ng-template>
    <ng-template #footer>
        <p-button label="Cerrar" icon="pi pi-times" text (click)="userDialog = false" />
        <p-button *ngIf="!viewMode" label="Guardar" icon="pi pi-check" (click)="saveUser()" [disabled]="!userForm.cedula || !userForm.nombres || !userForm.apellidos || !userForm.direccion || !userForm.telefono || !userForm.email || !userForm.username" />
    </ng-template>
</p-dialog>

<p-confirmDialog></p-confirmDialog>
<p-toast></p-toast>
